<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>MATE BLAST!</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
body{
  background:#0e0800;
  display:flex;flex-direction:column;align-items:center;
  min-height:100vh;height:100vh;overflow:hidden;
  font-family:'Arial Rounded MT Bold',Arial,sans-serif;
  color:#fff;touch-action:none;
}

/* HEADER */
#hdr{
  width:100%;max-width:440px;
  padding:10px 16px 6px;
  display:flex;justify-content:space-between;align-items:center;
  flex-shrink:0;
}
#logo{font-size:26px;font-weight:900;letter-spacing:3px;color:#75AADB;
  text-shadow:0 0 18px rgba(117,170,219,.55);}
#logo span{color:#F5D130;}
#scores{display:flex;gap:10px;}
.sbox{text-align:center;background:rgba(255,255,255,.08);border-radius:8px;padding:3px 12px;}
.slbl{font-size:8px;letter-spacing:1px;color:rgba(255,255,255,.5);text-transform:uppercase;}
.sval{font-size:17px;font-weight:900;color:#F5D130;}

/* BOARD */
#wrap{display:flex;flex-direction:column;align-items:center;flex:1;width:100%;
  padding:4px 8px 8px;gap:10px;justify-content:center;}
#board{
  display:grid;grid-template-columns:repeat(8,1fr);
  background:#0e0800;border-radius:12px;
  border:2px solid rgba(117,170,219,.25);
  box-shadow:0 0 28px rgba(117,170,219,.1);
  flex-shrink:0;
}
.c{
  border-radius:5px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.04);
  transition:background .08s;
}
.c.lit{box-shadow:inset 0 -3px 0 rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.28);}
.c.ghost{opacity:.45;}
.c.bad{background:rgba(255,60,60,.35)!important;}

/* TRAY */
#tray{
  display:flex;justify-content:space-around;align-items:center;
  width:100%;max-width:420px;
  background:rgba(255,255,255,.05);border-radius:14px;
  border:1px solid rgba(255,255,255,.08);
  padding:10px 4px;min-height:110px;flex-shrink:0;
}
.slot{display:flex;align-items:center;justify-content:center;
  width:110px;height:95px;cursor:grab;transition:transform .1s;}
.slot.used{opacity:.25;pointer-events:none;}
.pg{display:grid;}
.pc{border-radius:4px;
  box-shadow:inset 0 -2px 0 rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.28);}

/* HINT */
#hint{font-size:11px;color:rgba(255,255,255,.35);text-align:center;flex-shrink:0;}

/* FLOATING */
#fp{position:fixed;pointer-events:none;z-index:999;display:none;
  transform:translate(-50%,-50%);}

/* COMBO */
#combo{position:fixed;top:50%;left:50%;z-index:800;pointer-events:none;
  display:none;font-size:50px;font-weight:900;color:#F5D130;
  text-shadow:0 0 22px rgba(245,209,48,.85);
  animation:cpop .75s ease-out forwards;}
@keyframes cpop{
  0%{transform:translate(-50%,-50%) scale(.4);opacity:1}
  55%{transform:translate(-50%,-65%) scale(1.25);opacity:1}
  100%{transform:translate(-50%,-90%) scale(1);opacity:0}
}

/* Cell pop on place */
@keyframes cellpop{
  0%{transform:scale(.65);opacity:.5}
  60%{transform:scale(1.14)}
  100%{transform:scale(1);opacity:1}
}
.popping{animation:cellpop .22s cubic-bezier(.36,.07,.19,.97) forwards;}

/* CLEAR ANIM */
@keyframes clr{
  0%{transform:scale(1);opacity:1}
  35%{background:#fff!important;box-shadow:0 0 12px #fff;transform:scale(1.1);opacity:.9}
  100%{transform:scale(0);opacity:0}
}
.clearing{animation:clr .32s ease-out forwards;}

/* Floating score text */
.pts{position:fixed;z-index:900;pointer-events:none;font-size:21px;font-weight:900;
  color:#F5D130;text-shadow:0 2px 8px rgba(0,0,0,.9);
  animation:floatup .85s ease-out forwards;}
@keyframes floatup{
  0%{transform:translateY(0) scale(1);opacity:1}
  20%{transform:translateY(-12px) scale(1.15);opacity:1}
  100%{transform:translateY(-70px) scale(.9);opacity:0}
}

/* Score display flash */
@keyframes sflash{
  0%{transform:scale(1)}
  40%{transform:scale(1.35);color:#fff}
  100%{transform:scale(1);color:#F5D130}
}
.sflash{animation:sflash .3s ease-out;}

/* Board border glow on clear */
@keyframes bglow{
  0%{box-shadow:0 0 28px rgba(117,170,219,.1)}
  35%{box-shadow:0 0 55px rgba(58,172,94,.75),0 0 90px rgba(58,172,94,.3)}
  100%{box-shadow:0 0 28px rgba(117,170,219,.1)}
}
.bglow{animation:bglow .55s ease-out;}

/* Piece tray slots bounce in */
@keyframes bouncein{
  0%{transform:scale(0) rotate(-8deg);opacity:0}
  65%{transform:scale(1.12) rotate(2deg)}
  100%{transform:scale(1) rotate(0);opacity:1}
}
.bouncein{animation:bouncein .32s cubic-bezier(.36,.07,.19,.97) forwards;}

/* Board shake on game over */
@keyframes shake{
  0%,100%{transform:translateX(0)}
  15%{transform:translateX(-9px)}
  30%{transform:translateX(9px)}
  50%{transform:translateX(-6px)}
  70%{transform:translateX(6px)}
  90%{transform:translateX(-3px)}
}
.shake{animation:shake .5s ease-out;}

/* GAME OVER */
#go{display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.88);z-index:500;
  flex-direction:column;align-items:center;justify-content:center;gap:18px;}
#go h2{font-size:42px;color:#75AADB;text-shadow:0 0 25px rgba(117,170,219,.8);}
#go .fs{font-size:70px;font-weight:900;color:#F5D130;}
#go p{color:rgba(255,255,255,.65);font-size:15px;}
#go .sub{font-size:13px;color:rgba(255,255,255,.4);}
#rbtn{
  background:linear-gradient(135deg,#75AADB,#4a8ac3);
  color:#fff;border:none;padding:15px 44px;
  font-size:19px;font-weight:900;border-radius:50px;cursor:pointer;
  letter-spacing:2px;box-shadow:0 4px 20px rgba(117,170,219,.4);
  transition:transform .1s;
}
#rbtn:active{transform:scale(.94);}
</style>
</head>
<body>

<div id="hdr">
  <div id="logo">MATE<span>!</span></div>
  <div id="scores">
    <div class="sbox"><div class="slbl">Puntos</div><div class="sval" id="sdis">0</div></div>
    <div class="sbox"><div class="slbl">Record</div><div class="sval" id="bdis">0</div></div>
  </div>
</div>

<div id="wrap">
  <div id="board"></div>
  <div id="tray">
    <div class="slot" id="s0"></div>
    <div class="slot" id="s1"></div>
    <div class="slot" id="s2"></div>
  </div>
  <div id="hint">Arrasta las piezas al tablero</div>
</div>

<div id="fp"></div>
<div id="combo" id="combo"></div>

<div id="go">
  <h2>GAME OVER</h2>
  <div class="fs" id="fsc">0</div>
  <p>Puntaje final</p>
  <div class="sub" id="newrec" style="display:none;color:#F5D130;font-weight:900;">NUEVO RECORD!</div>
  <button id="rbtn">JUGAR DE NUEVO</button>
</div>

<script>
// ─── AUDIO ─────────────────────────────────────────────────────────────────
let AC = null;
function getAC(){
  if(!AC) try{ AC=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  if(AC&&AC.state==='suspended') AC.resume();
  return AC;
}
function tone(freq,type,dur,vol,t){
  const ac=getAC(); if(!ac) return;
  const o=ac.createOscillator(), g=ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type=type; o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.start(t); o.stop(t+dur);
}
function sndPickup(){
  const ac=getAC(); if(!ac) return; const t=ac.currentTime;
  tone(380,'sine',.08,.2,t); tone(560,'sine',.07,.15,t+.05);
}
function sndPlace(){
  const ac=getAC(); if(!ac) return; const t=ac.currentTime;
  tone(180,'square',.05,.12,t); tone(280,'sine',.12,.2,t+.02);
}
function sndClear(n){
  const ac=getAC(); if(!ac) return; const t=ac.currentTime;
  const f=[523,659,784,1047,1319];
  for(let i=0;i<Math.min(n+1,5);i++) tone(f[i],'sine',.22,.28,t+i*.07);
}
function sndCombo(n){
  const ac=getAC(); if(!ac) return; const t=ac.currentTime;
  tone(784,'sine',.12,.35,t); tone(1047,'sine',.14,.4,t+.09);
  tone(1319,'sine',.18,.45,t+.18);
  if(n>=3) tone(1568,'triangle',.25,.5,t+.28);
}
function sndGameOver(){
  const ac=getAC(); if(!ac) return; const t=ac.currentTime;
  tone(350,'sawtooth',.25,.25,t);
  tone(260,'sawtooth',.28,.25,t+.22);
  tone(180,'sawtooth',.4,.3,t+.46);
}

// ─── CONFIG ────────────────────────────────────────────────────────────────
const GS   = 8;   // grid size
const GAP  = 3;
const PAD  = 7;

// Compute cell size based on screen
const CELL = Math.min(44, Math.max(34, Math.floor((Math.min(window.innerWidth, 420) - PAD*2 - GAP*7 - 20) / GS)));

const COLORS = ['#75AADB','#F5D130','#3aac5e','#e8564a','#a55eea','#e8922e','#26bfbf'];

// All piece shapes: array of [row, col] offsets
const PIECES = [
  [[0,0]],                                      // dot
  [[0,0],[0,1]],                                // 1x2 h
  [[0,0],[1,0]],                                // 1x2 v
  [[0,0],[0,1],[0,2]],                          // 1x3 h
  [[0,0],[1,0],[2,0]],                          // 1x3 v
  [[0,0],[0,1],[1,0],[1,1]],                    // 2x2
  [[0,0],[1,0],[1,1],[2,1]],                    // S
  [[0,1],[1,0],[1,1],[2,0]],                    // Z
  [[0,0],[0,1],[0,2],[1,1]],                    // T
  [[0,0],[1,0],[2,0],[2,1]],                    // L
  [[0,1],[1,1],[2,0],[2,1]],                    // J
  [[0,0],[0,1],[0,2],[0,3]],                    // 1x4 h
  [[0,0],[1,0],[2,0],[3,0]],                    // 1x4 v
  [[0,0],[0,1],[1,0]],                          // corner TL
  [[0,0],[0,1],[1,1]],                          // corner TR
  [[0,1],[1,0],[1,1]],                          // corner BL
  [[0,0],[1,0],[1,1]],                          // corner BR
  [[0,0],[0,1],[0,2],[1,0]],                    // L-flat
  [[0,0],[0,1],[0,2],[1,2]],                    // J-flat
  [[1,0],[1,1],[1,2],[0,0]],                    // L-flat2
  [[1,0],[1,1],[1,2],[0,2]],                    // J-flat2
  [[0,0],[0,1],[0,2],[1,0],[1,1],[1,2]],        // 2x3 rect
  [[0,0],[0,1],[1,0],[1,1],[2,0],[2,1]],        // 3x2 rect
  [[0,0],[0,1],[0,2],[1,1],[2,1]],              // cross arm
];

// ─── STATE ──────────────────────────────────────────────────────────────────
let grid   = [];
let pieces = [null,null,null];
let used   = [false,false,false];
let score  = 0;
let best   = +( localStorage.getItem('mb_best')||0 );
let sel    = -1;
let dragging = false;
let ghostList= [];

// ─── DOM ────────────────────────────────────────────────────────────────────
const boardEl  = document.getElementById('board');
const fpEl     = document.getElementById('fp');
const comboEl  = document.getElementById('combo');
const goEl     = document.getElementById('go');
const sdisEl   = document.getElementById('sdis');
const bdisEl   = document.getElementById('bdis');
const fscEl    = document.getElementById('fsc');
const newrecEl = document.getElementById('newrec');
let   cells    = [];   // cells[r][c] = div

// ─── SETUP ──────────────────────────────────────────────────────────────────
function buildBoard(){
  boardEl.style.gap = GAP+'px';
  boardEl.style.padding = PAD+'px';
  boardEl.innerHTML='';
  cells=[];
  grid=Array.from({length:GS},()=>Array(GS).fill(null));
  for(let r=0;r<GS;r++){
    cells[r]=[];
    for(let c=0;c<GS;c++){
      const d=document.createElement('div');
      d.className='c';
      d.style.width=CELL+'px';
      d.style.height=CELL+'px';
      boardEl.appendChild(d);
      cells[r][c]=d;
    }
  }
}

// ─── VISUAL FX ──────────────────────────────────────────────────────────────
function popCells(list){
  list.forEach(([r,c],i)=>{
    const el=cells[r][c];
    el.classList.remove('popping');
    void el.offsetWidth;
    el.style.animationDelay=(i*.015)+'s';
    el.classList.add('popping');
    el.addEventListener('animationend',()=>{ el.classList.remove('popping'); el.style.animationDelay=''; },{once:true});
  });
}
function floatScore(pts,x,y){
  const d=document.createElement('div');
  d.className='pts'; d.textContent='+'+pts;
  d.style.left=x+'px'; d.style.top=y+'px';
  document.body.appendChild(d);
  d.addEventListener('animationend',()=>d.remove());
}
function flashScore(){
  sdisEl.classList.remove('sflash'); void sdisEl.offsetWidth;
  sdisEl.classList.add('sflash');
  sdisEl.addEventListener('animationend',()=>sdisEl.classList.remove('sflash'),{once:true});
}
function flashBoard(){
  boardEl.classList.remove('bglow'); void boardEl.offsetWidth;
  boardEl.classList.add('bglow');
  boardEl.addEventListener('animationend',()=>boardEl.classList.remove('bglow'),{once:true});
}
function bounceInSlots(){
  for(let i=0;i<3;i++){
    const slot=document.getElementById('s'+i);
    slot.style.animationDelay=(i*.08)+'s';
    slot.classList.remove('bouncein'); void slot.offsetWidth;
    slot.classList.add('bouncein');
    slot.addEventListener('animationend',()=>{ slot.classList.remove('bouncein'); slot.style.animationDelay=''; },{once:true});
  }
}

function initGame(){
  score=0;
  updateScore();
  bdisEl.textContent=best;
  goEl.style.display='none';
  buildBoard();
  newPieces();
}

// ─── PIECES ─────────────────────────────────────────────────────────────────
function randPiece(){
  const shape = PIECES[Math.floor(Math.random()*PIECES.length)];
  const color = COLORS[Math.floor(Math.random()*COLORS.length)];
  return {shape,color};
}

function newPieces(){
  for(let i=0;i<3;i++){ pieces[i]=randPiece(); used[i]=false; }
  renderTray();
  bounceInSlots();
}

function renderTray(){
  for(let i=0;i<3;i++){
    const slot=document.getElementById('s'+i);
    slot.innerHTML='';
    if(used[i]||!pieces[i]){slot.classList.add('used');continue;}
    slot.classList.remove('used');
    const p=pieces[i];
    const minR=Math.min(...p.shape.map(x=>x[0]));
    const maxR=Math.max(...p.shape.map(x=>x[0]));
    const minC=Math.min(...p.shape.map(x=>x[1]));
    const maxC=Math.max(...p.shape.map(x=>x[1]));
    const rows=maxR-minR+1, cols=maxC-minC+1;
    const pg=document.createElement('div');
    pg.className='pg';
    const ps=18; // piece cell size in tray
    pg.style.gridTemplateColumns=`repeat(${cols},${ps}px)`;
    pg.style.gridTemplateRows=`repeat(${rows},${ps}px)`;
    pg.style.gap='2px';
    const map=Array.from({length:rows},()=>Array(cols).fill(false));
    p.shape.forEach(([r,c])=>{ map[r-minR][c-minC]=true; });
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
      const d=document.createElement('div');
      d.style.width=ps+'px'; d.style.height=ps+'px';
      if(map[r][c]){d.className='pc'; d.style.background=p.color;}
      pg.appendChild(d);
    }
    slot.appendChild(pg);
    const idx=i;
    slot.onmousedown =(e)=>{e.preventDefault();startDrag(idx,e.clientX,e.clientY);};
    slot.ontouchstart=(e)=>{e.preventDefault();startDrag(idx,e.touches[0].clientX,e.touches[0].clientY);};
  }
}

// ─── DRAG ───────────────────────────────────────────────────────────────────
function startDrag(idx,x,y){
  if(used[idx]||!pieces[idx]) return;
  sel=idx; dragging=true;
  sndPickup();
  buildFloating(pieces[idx]);
  moveDrag(x,y);
}

function buildFloating(p){
  fpEl.innerHTML='';
  const minR=Math.min(...p.shape.map(x=>x[0]));
  const maxR=Math.max(...p.shape.map(x=>x[0]));
  const minC=Math.min(...p.shape.map(x=>x[1]));
  const maxC=Math.max(...p.shape.map(x=>x[1]));
  const rows=maxR-minR+1, cols=maxC-minC+1;
  const fg=document.createElement('div');
  fg.style.display='grid';
  fg.style.gridTemplateColumns=`repeat(${cols},${CELL}px)`;
  fg.style.gridTemplateRows=`repeat(${rows},${CELL}px)`;
  fg.style.gap=GAP+'px';
  const map=Array.from({length:rows},()=>Array(cols).fill(false));
  p.shape.forEach(([r,c])=>{ map[r-minR][c-minC]=true; });
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const d=document.createElement('div');
    d.style.width=CELL+'px'; d.style.height=CELL+'px';
    if(map[r][c]){
      d.style.borderRadius='5px';
      d.style.background=p.color;
      d.style.boxShadow='inset 0 -3px 0 rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.28)';
    }
    fg.appendChild(d);
  }
  fpEl.appendChild(fg);
  fpEl.style.display='block';
}

function moveDrag(x,y){
  if(!dragging) return;
  fpEl.style.left=x+'px';
  fpEl.style.top=y+'px';
  // board coords
  const br=boardEl.getBoundingClientRect();
  const step=CELL+GAP;
  const relX=x-br.left-PAD;
  const relY=y-br.top-PAD;
  const p=pieces[sel];
  // center piece on cursor
  const avgR=p.shape.reduce((s,[r])=>s+r,0)/p.shape.length;
  const avgC=p.shape.reduce((s,[,c])=>s+c,0)/p.shape.length;
  const gr=Math.round(relY/step - avgR);
  const gc=Math.round(relX/step - avgC);
  updateGhost(gr,gc);
}

function updateGhost(gr,gc){
  clearGhost();
  if(!dragging||sel<0) return;
  const p=pieces[sel];
  const valid=canPlace(p.shape,gr,gc);
  p.shape.forEach(([dr,dc])=>{
    const r=gr+dr, c=gc+dc;
    if(r>=0&&r<GS&&c>=0&&c<GS){
      cells[r][c].classList.add(valid?'ghost':'bad');
      if(valid) cells[r][c].style.background=p.color;
      else      cells[r][c].style.background='rgba(255,60,60,.35)';
      ghostList.push([r,c]);
    }
  });
}

function clearGhost(){
  ghostList.forEach(([r,c])=>{
    cells[r][c].classList.remove('ghost','bad');
    cells[r][c].style.background = grid[r][c] || '';
  });
  ghostList=[];
}

function endDrag(x,y){
  if(!dragging) return;
  fpEl.style.display='none';
  dragging=false;
  const br=boardEl.getBoundingClientRect();
  const step=CELL+GAP;
  const relX=x-br.left-PAD;
  const relY=y-br.top-PAD;
  if(sel>=0&&!used[sel]){
    const p=pieces[sel];
    const avgR=p.shape.reduce((s,[r])=>s+r,0)/p.shape.length;
    const avgC=p.shape.reduce((s,[,c])=>s+c,0)/p.shape.length;
    const gr=Math.round(relY/step-avgR);
    const gc=Math.round(relX/step-avgC);
    if(canPlace(p.shape,gr,gc)) place(sel,gr,gc);
  }
  clearGhost();
  sel=-1;
}

// ─── GAME LOGIC ─────────────────────────────────────────────────────────────
function canPlace(shape,gr,gc){
  return shape.every(([dr,dc])=>{
    const r=gr+dr, c=gc+dc;
    return r>=0&&r<GS&&c>=0&&c<GS&&!grid[r][c];
  });
}

function place(idx,gr,gc){
  const p=pieces[idx];
  const placed=[];
  p.shape.forEach(([dr,dc])=>{
    const r=gr+dr, c=gc+dc;
    grid[r][c]=p.color;
    cells[r][c].style.background=p.color;
    cells[r][c].classList.add('lit');
    placed.push([r,c]);
  });
  sndPlace();
  popCells(placed);
  used[idx]=true;
  document.getElementById('s'+idx).classList.add('used');
  score+=p.shape.length;
  updateScore();
  setTimeout(()=>{
    clearLines();
    if(used.every(u=>u)) newPieces();
    else{ renderTray(); checkOver(); }
  },55);
}

function clearLines(){
  const rs=[], cs=[];
  for(let r=0;r<GS;r++) if(grid[r].every(v=>v)) rs.push(r);
  for(let c=0;c<GS;c++) if(grid.every(row=>row[c])) cs.push(c);
  if(!rs.length&&!cs.length) return;
  const tot=rs.length+cs.length;
  const pts=tot*50+(tot>1?tot*30:0);
  score+=pts;
  sndClear(tot);
  if(tot>1){ showCombo(tot); sndCombo(tot); }
  flashBoard();
  // Show floating score near center of board
  const br=boardEl.getBoundingClientRect();
  floatScore(pts, br.left+br.width/2, br.top+br.height/2);
  flashScore();
  const set=new Set();
  rs.forEach(r=>{ for(let c=0;c<GS;c++) set.add(r+','+c); });
  cs.forEach(c=>{ for(let r=0;r<GS;r++) set.add(r+','+c); });
  // Staggered sweep animation
  set.forEach(k=>{
    const [r,c]=k.split(',').map(Number);
    const delay=( rs.includes(r) ? c : r )*0.028;
    cells[r][c].style.animationDelay=delay+'s';
    cells[r][c].classList.add('clearing');
  });
  setTimeout(()=>{
    set.forEach(k=>{
      const [r,c]=k.split(',').map(Number);
      grid[r][c]=null;
      cells[r][c].style.background='';
      cells[r][c].style.animationDelay='';
      cells[r][c].classList.remove('lit','clearing');
    });
    updateScore();
    checkOver();
  },370);
}

function showCombo(n){
  const msgs=['','','DOBLE!','TRIPLE!','BOMBA!','ULTRA!'];
  comboEl.textContent = msgs[Math.min(n,5)] || n+'x COMBO!';
  comboEl.style.display='block';
  comboEl.style.animation='none';
  void comboEl.offsetWidth;
  comboEl.style.animation='cpop .75s ease-out forwards';
  setTimeout(()=>{ comboEl.style.display='none'; },800);
}

function checkOver(){
  const avail=pieces.filter((_,i)=>!used[i]&&pieces[i]);
  if(!avail.length) return;
  const any=avail.some(p=>{
    for(let r=0;r<GS;r++) for(let c=0;c<GS;c++) if(canPlace(p.shape,r,c)) return true;
    return false;
  });
  if(!any) gameOver();
}

function gameOver(){
  sndGameOver();
  boardEl.classList.remove('shake'); void boardEl.offsetWidth;
  boardEl.classList.add('shake');
  boardEl.addEventListener('animationend',()=>boardEl.classList.remove('shake'),{once:true});
  setTimeout(()=>{
    const isNew = score>best;
    if(isNew){ best=score; localStorage.setItem('mb_best',best); bdisEl.textContent=best; }
    fscEl.textContent=score;
    newrecEl.style.display= isNew?'block':'none';
    goEl.style.display='flex';
  },550);
}

function updateScore(){
  sdisEl.textContent=score;
  if(score>best){ best=score; bdisEl.textContent=best; }
}

// Init AudioContext on first user gesture
document.addEventListener('touchstart',()=>getAC(),{once:true});
document.addEventListener('mousedown',()=>getAC(),{once:true});

// ─── EVENTS ─────────────────────────────────────────────────────────────────
document.addEventListener('mousemove', e=>{ if(dragging) moveDrag(e.clientX,e.clientY); });
document.addEventListener('mouseup',   e=>{ if(dragging) endDrag(e.clientX,e.clientY); });
document.addEventListener('touchmove', e=>{ if(dragging){e.preventDefault();moveDrag(e.touches[0].clientX,e.touches[0].clientY);}},{passive:false});
document.addEventListener('touchend',  e=>{ if(dragging){e.preventDefault();const t=e.changedTouches[0];endDrag(t.clientX,t.clientY);}},{passive:false});
document.getElementById('rbtn').addEventListener('click', initGame);

// ─── START ──────────────────────────────────────────────────────────────────
initGame();
</script>
</body>
