window.toggleAccordion = function(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
  const arrow = el.previousElementSibling?.querySelector('span:last-child');
  if (arrow) arrow.textContent = el.style.display === 'none' ? '▼' : '▲';
};

async function exportUserAnswers(uid) {
  const { u, comps, mMap, qByModule } = window._profileData || {};
  if (!u) return;
  const typeLabels = { single: 'Una respuesta', multiple: 'Varias respuestas', open: 'Desarrollo', image: 'Con imagen' };
  const sep = ';'; // punto y coma para Excel en español
  const rows = [['Colaborador','Campaña','Módulo','Intento N°','Puntaje','Estado','Fecha','N° Pregunta','Pregunta','Tipo','Respuesta del colaborador','Respuesta correcta']];
  (comps||[]).forEach((c) => {
    const mod = mMap[c.module_id];
    const qs = qByModule[c.module_id] || [];
    const openAnswers = c.open_answers || {};
    const mcAnswers = c.mc_answers || {};
    const byMod = (comps||[]).filter(x => x.module_id === c.module_id);
    const intentoNum = byMod.length - byMod.indexOf(c);
    const fecha = new Date(c.completed_at).toLocaleDateString('es-AR');
    const estado = c.passed ? 'Aprobado' : 'Reprobado';
    if (qs.length === 0) {
      rows.push([u.full_name, u.campaign, mod?.title||'—', intentoNum+'°', c.score+'%', estado, fecha, '—', '—', '—', '—', '—']);
    } else {
      qs.forEach((q, qi) => {
        const type = q.type || 'single';
        const opts = Array.isArray(q.options) ? q.options : JSON.parse(q.options||'[]');
        const correctIndices = Array.isArray(q.correct_indices) && q.correct_indices.length ? q.correct_indices : [q.correct_index||0];
        const correctText = correctIndices.map(i => opts[i]).filter(Boolean).join(' | ') || '—';
        let userAnswer = '(sin respuesta)';
        if (type === 'open' || (type === 'image' && opts.length < 2)) {
          userAnswer = openAnswers[q.id] || '(sin respuesta)';
        } else if (type === 'multiple') {
          const chosen = mcAnswers[q.id] || [];
          userAnswer = Array.isArray(chosen) && chosen.length ? chosen.map(i => opts[i]).filter(Boolean).join(' | ') : '(sin respuesta)';
        } else {
          const chosen = mcAnswers[q.id];
          userAnswer = (chosen !== undefined && chosen !== null) ? (opts[chosen] || '(sin respuesta)') : '(sin respuesta)';
        }
        rows.push([
          u.full_name, u.campaign, mod?.title||'—', intentoNum+'°',
          c.score+'%', estado, fecha,
          (qi+1)+'', q.question, typeLabels[type]||type,
          userAnswer, correctText
        ]);
      });
    }
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(sep)).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF' + encodeURIComponent(csv);
  a.download = `respuestas_${u.full_name.replace(/ /g,'_')}.csv`;
  a.click();
}

// ── SCORE OPEN ANSWERS ──
window.scoreOpenAnswer = async function(completionId, questionId, score, userId) {
  // Save or update score
  await sb.from('open_scores').upsert(
    { completion_id: completionId, question_id: questionId, score, scored_by: window.S.user.id, scored_at: new Date().toISOString() },
    { onConflict: 'completion_id,question_id' }
  );

  // Update button visuals
  for (let n = 1; n <= 10; n++) {
    const btn = document.getElementById(`score-btn-${completionId}-${questionId}-${n}`);
    if (!btn) continue;
    btn.style.background = n === score ? 'var(--accent)' : 'white';
    btn.style.color = n === score ? 'white' : 'var(--text)';
    btn.style.borderColor = n === score ? 'var(--accent)' : 'var(--border)';
  }

  // Recalculate module score
  // Get completion data
  const { data: comp } = await sb.from('completions').select('*').eq('id', completionId).single();
  if (!comp) return;

  // Get all questions for this module
  const { data: allQs } = await sb.from('questions').select('*').eq('module_id', comp.module_id);
  const { data: allScores } = await sb.from('open_scores').select('*').eq('completion_id', completionId);
  const scoresMap = Object.fromEntries((allScores||[]).map(s => [s.question_id, s.score]));

  const mcAnswers = comp.mc_answers || {};
  let totalPoints = 0;
  let maxPoints = 0;

  (allQs||[]).forEach(q => {
    const type = q.type || 'single';
    const correctIndices = Array.isArray(q.correct_indices) && q.correct_indices.length ? q.correct_indices : [q.correct_index||0];

    if (type === 'open' || (type === 'image' && (!q.options || q.options.length < 2))) {
      const s = scoresMap[q.id];
      if (s !== undefined) {
        totalPoints += s;
        maxPoints += 10;
      }
      // If not yet scored, don't count in max (pending)
    } else {
      maxPoints += 10;
      const opts = Array.isArray(q.options) ? q.options : JSON.parse(q.options||'[]');
      if (type === 'multiple') {
        const userAns = Array.isArray(mcAnswers[q.id]) ? mcAnswers[q.id] : [];
        const isCorrect = correctIndices.length === userAns.length && correctIndices.every(ci => userAns.includes(ci));
        if (isCorrect) totalPoints += 10;
      } else {
        const userAns = mcAnswers[q.id];
        if (userAns === (q.correct_index||0)) totalPoints += 10;
      }
    }
  });

  const newScore = maxPoints > 0 ? Math.round(totalPoints / maxPoints * 100) : comp.score;
  const newPassed = newScore >= 60;

  await sb.from('completions').update({ score: newScore, passed: newPassed }).eq('id', completionId);

  // Update score display in the accordion header
  const scoreColor = newScore>=80?'var(--success)':newScore>=60?'var(--warning)':'var(--danger)';
  const headerScore = document.querySelector(`[onclick="toggleAccordion('acc-${completionId}')"] span:first-of-type`);
  if (headerScore) headerScore.textContent = newScore + '%';

  // Update badge label
  const badgeEl = document.querySelector(`[onclick="toggleAccordion('acc-${completionId}')"] .badge`);
  if (badgeEl) {
    badgeEl.textContent = newPassed ? '✓ Aprobado' : '✗ Reprobado';
    badgeEl.className = `badge ${newPassed?'badge-green':'badge-red'}`;
  }

  // Show feedback
  const pendingBadge = document.getElementById(`score-btn-${completionId}-${questionId}-${score}`)?.closest('div[style*="border-bottom"]')?.querySelector('.badge');
  if (pendingBadge) { pendingBadge.textContent = `Calificado: ${score}/10`; pendingBadge.className = 'badge badge-blue'; }
};

                <td class="text-sm text-muted">${new Date(c.completed_at).toLocaleDateString('es-AR')}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `);
}

async function renderSupCampaigns() {
  setTopbarActions('');
  setContent('<div class="loading"><div class="spinner"></div></div>');
  const [{ data: users }, { data: mods }, { data: comps }] = await Promise.all([
    sb.from('users').select('*').eq('role','col'),
    sb.from('modules').select('*'),
    sb.from('completions').select('*')
  ]);
  const camps = [...new Set((users||[]).map(u=>u.campaign))];
  setContent(`
    <div class="campaign-grid">
      ${camps.map(camp => {
        const campUsers=(users||[]).filter(u=>u.campaign===camp);
        const campMods=(mods||[]).filter(m=>m.campaign===camp||m.campaign==='General');
        const totalExpected=campUsers.length*campMods.length;
        const passed=(comps||[]).filter(c=>{
          const u2=campUsers.find(u2=>u2.id===c.user_id);
          const m2=campMods.find(m2=>m2.id===c.module_id);
          return u2&&m2&&c.passed;
        }).length;
        const pct=totalExpected>0?Math.round(passed/totalExpected*100):0;
        return `<div class="campaign-card">
          <div class="campaign-name">${camp}</div>
          <div class="campaign-stats">${campUsers.length} colaboradores · ${campMods.length} módulos</div>
          <div class="progress-bar" style="margin-bottom:8px"><div class="progress-fill green" style="width:${pct}%"></div></div>
          <div style="display:flex;justify-content:space-between">
            <span class="text-sm text-muted">${pct}% completado</span>
            <span class="badge ${pct===100?'badge-green':pct>50?'badge-yellow':'badge-red'}">${passed}/${totalExpected}</span>
          </div>
        </div>`;
      }).join('')}
    </div>
  `);
}

async function renderSupOverdue() {
  setTopbarActions('');
  setContent('<div class="loading"><div class="spinner"></div></div>');
  const [{ data: users }, { data: mods }, { data: comps }] = await Promise.all([
    sb.from('users').select('*').eq('role','col'),
    sb.from('modules').select('*'),
    sb.from('completions').select('*')
  ]);
  const overdue = [];
  (users||[]).forEach(u => {
    (mods||[]).forEach(m => {
      if (m.campaign !== u.campaign && m.campaign !== 'General') return;
      const comp = (comps||[]).find(c => c.user_id===u.id && c.module_id===m.id);
      if (!comp) {
        const start = new Date(u.start_date||u.created_at);
        const due = new Date(start); due.setDate(due.getDate()+(m.days_limit||7));
        const days = Math.floor((new Date()-due)/86400000);
        if (days > 0) overdue.push({ user:u, mod:m, due, days });
      }
    });
  });
  overdue.sort((a,b)=>b.days-a.days);
  setContent(`
    <div class="card">
      <div class="card-header"><div class="card-title">Módulos Vencidos (${overdue.length})</div></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Colaborador</th><th>Campaña</th><th>Módulo</th><th>Venció</th><th>Días de retraso</th></tr></thead>
          <tbody>
            ${overdue.length===0?'<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-muted)">¡Sin vencidos! 🎉</td></tr>':
              overdue.map(o=>`<tr>
                <td>${o.user.full_name}</td>
                <td><span class="badge badge-orange">${o.user.campaign}</span></td>
                <td>${o.mod.title}</td>
                <td class="text-sm text-muted">${o.due.toLocaleDateString('es-AR')}</td>
                <td><span class="badge badge-red">${o.days} días</span></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `);
}

async function renderSupSurveys() {
  setTopbarActions('');
  setContent('<div class="loading"><div class="spinner"></div></div>');
  const [{ data: surveys }, { data: users }, { data: mods }] = await Promise.all([
    sb.from('surveys').select('*').order('created_at', { ascending: false }),
    sb.from('users').select('id,full_name'),
    sb.from('modules').select('id,title')
  ]);
  const uMap=Object.fromEntries((users||[]).map(u=>[u.id,u]));
  const mMap=Object.fromEntries((mods||[]).map(m=>[m.id,m]));
  const avg=(surveys||[]).length?((surveys||[]).reduce((a,s)=>a+s.rating,0)/(surveys||[]).length).toFixed(1):'-';
  setContent(`
    <div class="stat-card" style="max-width:200px;margin-bottom:20px">
      <div class="stat-icon yellow">⭐</div>
      <div><div class="stat-value">${avg}</div><div class="stat-label">Promedio General</div></div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">Encuestas (${(surveys||[]).length})</div></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Colaborador</th><th>Módulo</th><th>Estrellas</th><th>Comentario</th><th>Fecha</th></tr></thead>
          <tbody>
            ${(surveys||[]).map(s=>`<tr>
              <td>${uMap[s.user_id]?.full_name||'—'}</td>
              <td>${mMap[s.module_id]?.title||'—'}</td>
              <td>${'⭐'.repeat(s.rating)}</td>
              <td class="text-sm">${s.comment||'—'}</td>
              <td class="text-sm text-muted">${new Date(s.created_at).toLocaleDateString('es-AR')}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `);
}


function showModal(id, title, body, onSave, readOnly) {
  closeModal();
  const m = document.createElement('div');
  m.className = 'modal-overlay'; m.id = 'modalOverlay';
  m.innerHTML = `<div class="modal modal-lg">
    <div class="modal-header">
      <div class="modal-title">${title}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">${body}</div>
    ${!readOnly ? `<div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="modalSaveBtn" onclick="modalSave()">Guardar</button>
    </div>` : ''}
  </div>`;
  document.body.appendChild(m);
  m.addEventListener('click', e => { if (e.target === m) closeModal(); });
  window._modalOnSave = onSave;
}

window.modalSave = async function() {
  const btn = document.getElementById('modalSaveBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando...'; }
  try { await window._modalOnSave?.(); }
  catch(e) { alert('Error: ' + e.message); if (btn) { btn.disabled = false; btn.textContent = 'Guardar'; } }
};

function closeModal() {
  document.getElementById('modalOverlay')?.remove();
}
</script>
</body>
